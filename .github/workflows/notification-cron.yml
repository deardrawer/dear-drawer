name: Send Geunnal Notifications

on:
  schedule:
    # 매 5분마다 (UTC) - 1분 단위 알림 지원
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # 수동 실행 가능

jobs:
  send-notifications:
    runs-on: ubuntu-latest

    steps:
      - name: Send push notifications
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          API_URL: ${{ secrets.API_URL }}
        run: |
          echo "Sending notifications at $(date)"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${API_URL}/api/geunnal/notifications/send" -H "Authorization: Bearer ${CRON_SECRET}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response: $BODY"
          echo "HTTP Code: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: API returned status $HTTP_CODE"
            exit 1
          fi

          echo "Notifications sent successfully"
